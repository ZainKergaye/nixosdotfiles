name: Update Flake Inputs

on:
  schedule: [{ cron: '0 2 * * 0' }]   # every Sunday 02:00 UTC
  workflow_dispatch:                  # manual trigger

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    env:
      # Change this value (or override it when you manually dispatch) to set the commit message.
      GIT_COMMIT_MESSAGE: "chore(deps): update flake inputs – automated"
    steps:
      # -------------------------------------------------
      # 1️⃣ Generate a short‑lived GitHub‑App token
      # -------------------------------------------------
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.FLAKE_UPDATE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            nixosdotfiles

      # -------------------------------------------------
      # 2️⃣ Checkout repository (uses the token)
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      # -------------------------------------------------
      # 3️⃣ Install Nix + magic‑nix‑cache
      # -------------------------------------------------
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = 1

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      # -------------------------------------------------
      # 5️⃣ Run DeterminateSystems/update‑flake‑lock with retries
      # -------------------------------------------------
      - name: Update flake.lock (with exponential back‑off)
        id: ds-update
        run: |
          set -euo pipefail

          mkdir -p $HOME/.config/nix
          # The token is sent as an *access‑token* for github.com.
          # Nix will add the header “Authorization: Bearer <token>”.
          cat <<EOF >> $HOME/.config/nix/nix.conf
          access-tokens = github.com=${{ steps.app-token.outputs.token }}
          EOF

          MAX_RETRIES=5
          DELAY=10

          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "🔄  Attempt $i of $MAX_RETRIES…"
            # The action is just a thin wrapper around `nix flake update`.
            # Running it via `nix run` lets us wrap it in a retry loop.
            nix run github:DeterminateSystems/update-flake-lock@main \
              -- \
              --pr-create false \             # we create the PR ourselves later
              --pr-title "chore(deps): daily flake input updates" \
              --pr-labels "dependencies\nautomated" \
              --commit-message "${GIT_COMMIT_MESSAGE}"
            status=$?
            if [ $status -eq 0 ]; then
              echo "update-success=true" >> $GITHUB_OUTPUT
              break
            fi
            echo "⚠️  Update failed (status $status); waiting ${DELAY}s before retry…"
            sleep $DELAY
            DELAY=$((DELAY * 2))
          done

          if [ $status -ne 0 ]; then
            echo "update-success=false" >> $GITHUB_OUTPUT
            exit $status
          fi

      # -------------------------------------------------
      # 6️⃣ Did the lock file actually change?
      # -------------------------------------------------
      - name: Detect lock‑file change
        id: changed
        run: |
          if git diff --quiet HEAD^ HEAD -- flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # 7️⃣ (Optional) Build & test the new configuration
      # -------------------------------------------------
      - name: Build test configurations
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo "🔧  Building test hosts…"
          for host in thinkpad; do
            nix build .#nixosConfigurations.$host.config.system.build.toplevel \
              --show-trace --no-link || {
                echo "❌  Build failed for $host"
                exit 1
              }
          done
          echo "✅  All builds succeeded"

      # -------------------------------------------------
      # 8️⃣ Generate a nice markdown summary (table)
      # -------------------------------------------------
      - name: Create update summary table
        if: steps.changed.outputs.changed == 'true'
        id: summary
        run: |
          set -euo pipefail
          nix flake metadata --json > meta.json
          {
            printf "| Input | Old rev | New rev | Source |\n"
            printf "|-------|----------|----------|--------|\n"
          } > summary.md

          jq -r '
            .locks.nodes |
            to_entries[] |
            select(.value.locked.type != null) |
            {
              name: .key,
              old: (.value.locked.prev.rev // .value.locked.prev.narHash // "—") | .[0:7],
              new: (.value.locked.rev // .value.locked.narHash // "—") | .[0:7],
              url: .value.locked.url // "—"
            } |
            "\(.name) | \(.old) | \(.new) | \(.url)"
          ' meta.json >> summary.md

          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat summary.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # 9️⃣ Create the Pull Request (custom body)
      # -------------------------------------------------
      - name: Create Pull Request
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: ${{ env.GIT_COMMIT_MESSAGE }}
          title: "chore(deps): daily flake input updates"
          branch: chore/flake-update-daily
          delete-branch: true
          body: |
            ## 🔄 Automated Flake Input Update

            This PR updates the inputs defined in `flake.lock` to their newest revisions.

            ### 📦 Updated inputs
            ${{ steps.summary.outputs.summary }}

            ### ✅ Testing status
            All host configurations (`thinkpad`…) build successfully.

            ### 📋 Review checklist
            - [ ] Verify the changes in `flake.lock`
            - [ ] Check changelogs for possible breaking changes
            - [ ] Run any additional integration tests you need
            - [ ] Approve & merge

            <sub>Generated by the **Update Flake Inputs** workflow.</sub>
          labels: |
            dependencies
            automated
          assignees: olafkfreund
          draft: false

      # -------------------------------------------------
      # 10️⃣ Auto‑merge (optional – let CI decide)
      # -------------------------------------------------
      - name: Auto‑merge if CI passes
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo "✅ PR created – it will be merged automatically once required checks pass."

