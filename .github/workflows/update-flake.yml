name: Update Flake Inputs

on:
  schedule: [{ cron: '0 2 * * 0' }]   # every Sunday 02:00 UTC
  workflow_dispatch:                  # manual trigger

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    env:
      # Change this value (or override it when you manually dispatch) to set the commit message.
      GIT_COMMIT_MESSAGE: "chore(deps): update flake inputs – automated"
    steps:
      # -------------------------------------------------
      # 1️⃣ Generate a short‑lived GitHub‑App token
      # -------------------------------------------------
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.FLAKE_UPDATE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            nixosdotfiles

      # -------------------------------------------------
      # 2️⃣ Checkout repository (uses the token)
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      # -------------------------------------------------
      # 3️⃣ Install Nix + magic‑nix‑cache
      # -------------------------------------------------
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = 1

      - name: Setup Cachix 
        uses: cachix/cachix-action@v17
        with:
          name: zain-system-cache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      # -------------------------------------------------
      # 4️⃣  Run the flake‑lock update (no PR generated here)
      # -------------------------------------------------
      - name: Update flake.lock
        id: flake-update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          mkdir -p $HOME/.config/nix
          # The token is sent as an *access‑token* for github.com.
          # Nix will add the header “Authorization: Bearer <token>”.
          cat <<EOF >> $HOME/.config/nix/nix.conf
          access-tokens = github.com=${{ steps.app-token.outputs.token }}
          EOF

          echo "Running nix flake update…"
          cp flake.lock flake.lock.before

          # retry with exponential back‑off (same logic you had)
          MAX_RETRIES=5
          DELAY=10
          for ((i=1; i<=MAX_RETRIES; i++)); do
            if nix flake update nixpkgs nixvim-custom; then
              break
            fi
            if (( i < MAX_RETRIES )); then
              echo "Rate‑limit / failure – waiting ${DELAY}s…"
              sleep $DELAY
              DELAY=$((DELAY*2))
            else
              echo "❌  Update failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

          # Detect whether anything changed
          if diff -q flake.lock flake.lock.before > /dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # 7️⃣ (Optional) Build & test the new configuration
      # -------------------------------------------------
      - name: Build test configurations
        if: steps.flake-update.outputs.changed == 'true'
        run: |
          echo "🔧  Building test hosts…"
          for host in thinkpad; do
            nix build .#nixosConfigurations.$host.config.system.build.toplevel \
              --show-trace --no-link || {
                echo "❌  Build failed for $host"
                exit 1
              }
          done
          echo "✅  All builds succeeded"

      # -------------------------------------------------
      # 8️⃣ Generate a nice markdown summary (table)
      # -------------------------------------------------
      - name: Create update summary table
        if: steps.flake-update.outputs.changed == 'true'
        id: summary
        run: |
          set -euo pipefail
          nix flake metadata --json > meta.json
          {
            printf "| Input | Old rev | New rev | Source |\n"
            printf "|-------|----------|----------|--------|\n"
          } > summary.md

          jq -r '
            .locks.nodes |
            to_entries[] |
            select(.value.locked.type != null) |
            {
              name: .key,
              old: (
                    if .value.locked.prev.rev != null then .value.locked.prev.rev
                    elif .value.locked.prev.narHash != null then .value.locked.prev.narHash
                    else "—"
                    end
                  ) | .[0:7],
              new: (
                    if .value.locked.rev != null then .value.locked.rev
                    elif .value.locked.narHash != null then .value.locked.narHash
                    else "—"
                    end
                  ) | .[0:7],
              url: (
                    if .value.locked.url != null then .value.locked.url
                    else "—"
                    end
                  )
            } |
            "\(.name) | \(.old) | \(.new) | \(.url)"
          ' meta.json >> summary.md

          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat summary.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # 9️⃣ Create the Pull Request (custom body)
      # -------------------------------------------------
      - name: Create Pull Request
        if: steps.flake-update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: flake.lock
          token: ${{ steps.app-token.outputs.token }}
          commit-message: ${{ env.GIT_COMMIT_MESSAGE }}
          title: "chore(deps): daily flake input updates"
          branch: chore/flake-update-daily
          delete-branch: true
          body: |
            ## 🔄 Automated Flake Input Update

            This PR updates the inputs defined in `flake.lock` to their newest revisions.

            ### 📦 Updated inputs
            ${{ steps.summary.outputs.summary }}

            ### ✅ Testing status
            All host configurations (`thinkpad`…) build successfully.

            ### 📋 Review checklist
            - [ ] Verify the changes in `flake.lock`
            - [ ] Check changelogs for possible breaking changes
            - [ ] Run any additional integration tests you need
            - [ ] Approve & merge

            <sub>Generated by the **Update Flake Inputs** workflow.</sub>
          labels: |
            dependencies
            automated
          assignees: zainkergaye
          reviewers: zainkergaye
          draft: false

      # -------------------------------------------------
      # 10️⃣ Auto‑merge (optional – let CI decide)
      # -------------------------------------------------
      - name: Auto‑merge if CI passes
        if: steps.flake-update.outputs.changed == 'true'
        run: |
          echo "✅ PR created – it will be merged automatically once required checks pass."

